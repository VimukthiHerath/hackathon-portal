<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLIIT Hackathon Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 text-slate-900 p-2 rounded-lg font-black text-xl tracking-wider shadow-lg shadow-amber-500/20">
                    SLIIT
                </div>
                <span class="font-bold text-lg text-slate-200">CODE CHALLENGE 2026</span>
            </div>
            <div class="flex items-center space-x-2 text-xs bg-slate-800 py-1.5 px-3 rounded-full border border-slate-700">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-slate-400 font-medium">LIVE PARSING ENGINE</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                Live Leaderboard
            </h1>
            <p class="text-slate-400 text-sm mt-2">Real-time evaluation rankings powered securely by automated serverless environments.</p>
        </div>

        <div class="bg-slate-800/40 border border-slate-800 rounded-2xl overflow-hidden backdrop-blur-md shadow-2xl" id="board-container">
            <div class="p-8 text-center text-slate-400" id="board">
                <i class="fa-solid fa-circle-notch animate-spin text-amber-500 text-2xl mb-3"></i>
                <p>Establishing datalink connection...</p>
            </div>
        </div>
    </main>

    <script>
        var cacheBusterUrl = 'leaderboard.json?v=' + Date.now();

        fetch(cacheBusterUrl)
            .then(res => {
                if (!res.ok) throw new Error('Data storage unavailable.');
                return res.json();
            })
            .then(data => {
                // Map object entries to an array and sort descending by score
                var sortedTeams = [];
                for (var name in data) {
                    if (data.hasOwnProperty(name)) {
                        sortedTeams.push({ name: name, score: data[name].score, status: data[name].status || 'Active' });
                    }
                }
                sortedTeams.sort((a, b) => b.score - a.score);

                var html = '<div class="overflow-x-auto"><table class="w-full text-left border-collapse">';
                html += '<thead><tr class="border-b border-slate-800 text-slate-400 text-xs font-semibold uppercase tracking-wider bg-slate-800/50"><th class="py-4 px-6">Rank</th><th class="py-4 px-6">Team Profile</th><th class="py-4 px-6">Status</th><th class="py-4 px-6 text-right">Score</th></tr></thead>';
                html += '<tbody class="divide-y divide-slate-800/60">';

                sortedTeams.forEach((team, index) => {
                    var rankBadge = `<span class="text-slate-500 font-mono">${index + 1}</span>`;
                    if (index === 0 && team.score > 0) rankBadge = '🥇';
                    if (index === 1 && team.score > 0) rankBadge = '🥈';
                    if (index === 2 && team.score > 0) rankBadge = '🥉';

                    var statusBadge = '<span class="px-2.5 py-1 text-xs font-semibold bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/20">Active</span>';
                    var rowStyle = 'class="hover:bg-slate-800/20 transition duration-150"';
                    var nameDisplay = `<span class="font-bold text-slate-200 text-base">${team.name}</span>`;

                    if (team.status.includes('Disqualified')) {
                        statusBadge = '<span class="px-2.5 py-1 text-xs font-semibold bg-rose-500/10 text-rose-400 rounded-full border border-rose-500/20">Disqualified ⚠️</span>';
                        rowStyle = 'class="bg-rose-950/10 opacity-60 line-through"';
                        nameDisplay = `<span class="font-medium text-slate-500">${team.name}</span>`;
                    } else if (team.status.includes('Failed')) {
                        statusBadge = `<span class="px-2.5 py-1 text-xs font-semibold bg-amber-500/10 text-amber-400 rounded-full border border-amber-500/20">${team.status}</span>`;
                    }

                    html += `<tr ${rowStyle}>`;
                    html += `<td class="py-4 px-6 w-16 text-center">${rankBadge}</td>`;
                    html += `<td class="py-4 px-6">${nameDisplay}</td>`;
                    html += `<td class="py-4 px-6">${statusBadge}</td>`;
                    html += `<td class="py-4 px-6 text-right font-mono font-bold text-lg text-amber-400">${team.score} <span class="text-xs text-slate-500 font-normal">pts</span></td>`;
                    html += '</tr>';
                });

                html += '</tbody></table></div>';
                document.getElementById('board-container').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('board-container').innerHTML = `
                    <div class="p-8 text-center text-rose-400">
                        <i class="fa-solid fa-circle-exclamation text-3xl mb-2"></i>
                        <p class="font-bold">Dashboard Connection Failure</p>
                        <p class="text-xs text-slate-500 mt-1">${err.message}</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
